name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Tidy dependencies
        run: go mod tidy
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./cmd/k8s-mcp-server
