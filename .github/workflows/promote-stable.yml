name: promote-stable

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing release tag to promote to stable, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/vk7416/generic-k8s-mcp
  DOCKERHUB_IMAGE: docker.io/bullraju/generic-k8s-mcp

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate source tag
        run: |
          case "${{ github.event.inputs.source_tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Tag must match vMAJOR.MINOR.PATCH"
              exit 1
              ;;
          esac
          git rev-parse "refs/tags/${{ github.event.inputs.source_tag }}"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: bullraju
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote GHCR image to stable
        run: |
          docker buildx imagetools create \
            --tag "${{ env.GHCR_IMAGE }}:stable" \
            "${{ env.GHCR_IMAGE }}:${{ github.event.inputs.source_tag }}"

      - name: Promote Docker Hub image to stable
        run: |
          docker buildx imagetools create \
            --tag "${{ env.DOCKERHUB_IMAGE }}:stable" \
            "${{ env.DOCKERHUB_IMAGE }}:${{ github.event.inputs.source_tag }}"

      - name: Move stable git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f stable "${{ github.event.inputs.source_tag }}"
          git push origin refs/tags/stable --force
