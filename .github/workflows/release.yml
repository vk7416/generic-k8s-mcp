name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag to release, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/vk7416/generic-k8s-mcp
  DOCKERHUB_IMAGE: docker.io/bullraju/generic-k8s-mcp

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.vars.outputs.tag }}

      - name: Validate tag format
        run: |
          case "${{ steps.vars.outputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Tag must match vMAJOR.MINOR.PATCH"
              exit 1
              ;;
          esac

      - name: Ensure tag exists for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: git rev-parse "${{ steps.vars.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Tidy dependencies
        run: go mod tidy

      - name: Test
        run: go test ./...

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: bullraju
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=generic-k8s-mcp
            org.opencontainers.image.description=Read-only Kubernetes MCP server
            org.opencontainers.image.source=https://github.com/vk7416/generic-k8s-mcp
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Container images

            - `${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.tag }}`
            - `${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.tag }}`

            ## Floating tags

            - `${{ env.GHCR_IMAGE }}:latest`
            - `${{ env.DOCKERHUB_IMAGE }}:latest`
